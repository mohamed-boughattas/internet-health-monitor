name: raw.net_loss_shutdown_BR
type: ingestr
connection: duckdb-default

materialization:
  type: table
  strategy: delete+insert
  incremental_key: date

columns:
  - name: date
    type: date
    primary_key: true
  - name: country
    type: varchar
  - name: duration
    type: float
  - name: shutdown__gdp
    type: float
  - name: risk
    type: float

parameters:
  source_connection: isoc-pulse-default
  source_table: "net_loss:shutdown:BR"
  destination: duckdb
