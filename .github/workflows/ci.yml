name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff linter
        run: uv run ruff check .

      - name: Run pyrefly type checker
        run: uv run pyrefly check dashboard/ tests/ assets/enrichment/

      - name: Run ruff formatter check
        run: uv run ruff format --check .

      - name: Run pytest
        run: uv run pytest tests/ -v

      - name: Check drift
        run: uv run python scripts/generate_assets.py --check

  bruin-validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bruin
        uses: bruin-data/setup-bruin@main

      - name: Validate pipeline
        run: bruin validate .
        env:
          ISOC_PULSE_TOKEN: ${{ secrets.ISOC_PULSE_TOKEN }}
          TELEMETRY_OPTOUT: "true"